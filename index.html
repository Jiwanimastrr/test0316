<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpongeBob's Lotto Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">Switch Theme</button>
    </div>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        
        <div class="numbers-container">
            <div class="number-circle"></div>
            <div class="number-circle"></div>
            <div class="number-circle"></div>
            <div class="number-circle"></div>
            <div class="number-circle"></div>
            <div class="number-circle"></div>
        </div>

        <div id="spongebob-container">
            <img id="spongebob-img" src="https://static.wikia.nocookie.net/spongebob/images/d/d7/SpongeBob_Stock_Art.png" alt="SpongeBob">
        </div>
        
        <button id="generate-btn">Generate Numbers</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
